{% extends 'base.html' %}

{% block title %}Delete User{% endblock %}

{% block content %}
<h1>Are you sure you want to delete this user?</h1>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'user_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
